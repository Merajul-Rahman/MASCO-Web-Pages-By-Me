<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALLY WEiJL</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0
        }
        .main_wrap {
            font-size: 12px;
            /* margin: 100px 0; */
            font-family: 'Roboto', sans-serif;
        }

        p {
            margin: 0
        }

        .print_box {
            width: 100mm;
            margin: 20px auto;
            height: 142mm;
            border: 1px solid #ccc;
            padding: 0px 13px;
            background-color: #010882;
        }

        .btn-box {
            display: flex;
            justify-content: center;
        }
        input{
            background: transparent;
            border: 2px solid black;
        }

        .print {
            /* position: absolute;
            bottom: -55px; */
            margin: 20px 0;
            padding: 8px 15px;
            background-color: green;
            color: white;
            display: flex;
            align-self: center;
            justify-content: center;
            align-items: center;
        }
        .topdiv{
            margin-top: 19px;
            display: grid;
            grid-template-columns: 45px 118px 70px 118px;
            row-gap: 9px;
            align-items: center;
            justify-content: center;
        }
        .topdiv > :nth-child(3),
.topdiv > :nth-child(7),
.topdiv > :nth-child(11) {
    margin-left: 15px;
}

        .topdiv input {
            width: 117px;
        }
        .topdiv label{
            font-weight: 600;
        }

        @media print {
            .btn-box {
                display: none;
            }

            .print_box {
                /** 100mm **/
                width: 100mm;
                margin: 0 auto;
                /** 175mm **/
                height: 142mm;
                border: 1px solid #ccc;
                padding: 0px 13px;
            }
            body {-webkit-print-color-adjust: exact;}
        }
    </style>
</head>

<body>
    <div class="main_wrap">
        <div class="print_box">
            <div style="margin-top: 7mm; display: flex; justify-content: center;">
                <img src="logo.png" alt="" height="22px" width="150px">
            </div>
            <p style="font-size: 16px; font-weight: 600; text-align: center; margin-top: 2mm;">RS SAMPLE CARD</p>
            <div class="topdiv">
                <label for="date">DATE</label>
                <input type="text" name="date" id="date">
                <label for="Season">SEASON</label>
                <input type="text" name="Season" id="Season">
                <label for="STYLE">STYLE</label>
                <input type="text" name="STYLE" id="STYLE">
                <label for="PO">PO</label>
                <input type="text" name="PO" id="PO">
                <label for="COLOR">COLOR</label>
                <input type="text" name="COLOR" id="COLOR">
                <label for="WEIGHT">WEIGHT</label>
                <input type="text" name="WEIGHT" id="WEIGHT">
            </div>

            <div style="margin-top: 15px; display: flex; align-items: center; ">
                <p style="font-size: 17PX; font-weight: bolder;">SUPPLIER</p>
                <input type="text" name="" id="" style="margin-left: 2px; width: 264px; height: 26.5px;">
            </div>

            <p style="font-size: 20px; font-weight: bolder; margin-top: 19px;">FABRICATIONS</p>
            
            <div style="margin-top: 15px; display: flex; align-items: center;">
                <p style="font-size: 17PX; font-weight: bolder;">BODY</p>
                <input type="text" name="" id="" style="margin-left: 18px; width: 283px; height: 26.5px;">
            </div>
            
            <div style="margin-top: 10px; display: flex; align-items: center; ">
                <p style="font-size: 17PX; font-weight: bolder;">LINING</p>
                <input type="text" name="" id="" style="margin-left: 10px; width: 283px; height: 26.5px;">
            </div>
            
            <div style="display: flex; margin-top: 18px; align-items: center;">
                <p style="font-size: 17px; font-weight: bolder;">CONFORMITY</p>
                <P style="margin-left: 5px; border: 2px solid black; font-size: 17px; font-weight: bolder; padding: 0px 1px;">FABRICS</P>
                <P style="margin-left: 5px; border: 2px solid black; font-size: 17px; font-weight: bolder; padding: 0px 3px;">LINING</P>
                <P style="margin-left: 5px; border: 2px solid black; font-size: 17px; font-weight: bolder; padding: 0px 4px;">TRIMS</P>
            </div>

            
            <p style="font-size: 18px; margin-top: 18px; font-weight: bolder;">BARCODE</p>
            <div style="border: 2px solid black; margin-top: 2px; height: 23mm; width: 90mm;"></div>

        </div>

        <div class="btn-box">
            <button class="print" onclick="window.print()">Print</button>
        </div>
    </div>
</body>

</html>
